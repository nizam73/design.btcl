<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="design.btcl – A directory of design file resources for the BTCL Design Team." />
  <title>design.btcl</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="header-left">
      <h1>design.btcl (Test going on)</h1>
    </div>
    <div class="header-right">
      <!-- User avatar (shown when logged in) -->
      <div id="user-avatar-wrap" class="hidden">
        <img id="user-avatar" src="" alt="User profile picture" title="" />
      </div>
      <!-- Login button (shown when logged out) -->
      <button id="login-btn" class="btn-login" title="Sign in with Google">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.121 17.64 11.834 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign In
      </button>
      <!-- More (⋮) menu — always visible, admin portal inside -->
      <div class="more-menu-wrap">
        <button class="btn-more" id="more-btn" aria-label="More options" aria-expanded="false">⋮</button>
        <div class="more-dropdown hidden" id="more-dropdown">
          <button id="admin-portal-btn" class="dropdown-item hidden">🛠 Admin Portal</button>
          <button id="logout-btn" class="dropdown-item hidden">Sign Out</button>
          <span id="dropdown-hint" class="dropdown-hint">Sign in to access more options</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== TABS NAV ===== -->
  <div class="tabs-bar-wrap">
    <nav class="navbar" id="tabs-nav" role="tablist" aria-label="Section Navigation">
      <!-- Tabs rendered by JS -->
    </nav>
    <!-- Add Tab button — admin only -->
    <button id="add-tab-btn" class="btn-add-tab hidden" title="Add new tab">＋ Tab</button>
  </div>

  <!-- ===== TAB CONTENT AREA ===== -->
  <main id="tab-content-area">
    <!-- Rendered by JS -->
  </main>

  <!-- ===== MODALS ===== -->

  <!-- Google Login Popup (for non-admin button clicks) -->
  <div class="modal-overlay hidden" id="login-modal">
    <div class="modal">
      <button class="modal-close" id="login-modal-close" aria-label="Close">✕</button>
      <h2>Sign in Required</h2>
      <p>Please sign in with your Google account to access this file.</p>
      <button id="login-modal-google-btn" class="btn-google-full">
        <svg width="20" height="20" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.121 17.64 11.834 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </div>

  <!-- Edit Card Modal -->
  <div class="modal-overlay hidden" id="edit-card-modal">
    <div class="modal modal-wide">
      <button class="modal-close" id="edit-card-close" aria-label="Close">✕</button>
      <h2 id="edit-card-title">Edit Card</h2>
      <div class="form-group">
        <label>Headline</label>
        <input type="text" id="ec-headline" placeholder="Card headline" />
      </div>
      <div class="form-group">
        <label>Description <span class="hint">(date, ratio, notes…)</span></label>
        <input type="text" id="ec-desc" placeholder="e.g. 07/10/2025 | Ratio = 135 : 61.3" />
      </div>
      <div class="form-group">
        <label>Warning text <span class="hint">(leave empty to hide)</span></label>
        <input type="text" id="ec-warning" placeholder="e.g. Change Contact Address as required" />
      </div>
      <div class="form-group">
        <label>Preview image filename <span class="hint">(must be in root folder)</span></label>
        <input type="text" id="ec-image" placeholder="e.g. logo BTCL only.jpg" />
      </div>
      <div class="form-group">
        <label>Image alt text</label>
        <input type="text" id="ec-alt" placeholder="Describe the image" />
      </div>
      <hr class="form-divider" />
      <p class="form-section-label">Download Buttons</p>
      <div class="form-group">
        <label>Vector File URL</label>
        <input type="url" id="ec-btn-green" placeholder="https://…" />
      </div>
      <div class="form-group">
        <label>Image File URL</label>
        <input type="url" id="ec-btn-dark" placeholder="https://…" />
      </div>
      <div class="form-group">
        <label>PDF File URL</label>
        <input type="url" id="ec-btn-light" placeholder="https://…" />
      </div>
      <input type="hidden" id="ec-tab-id" />
      <input type="hidden" id="ec-card-id" />
      <div class="modal-actions">
        <button class="btn-cancel" id="edit-card-cancel">Cancel</button>
        <button class="btn-save" id="edit-card-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Add Tab Modal -->
  <div class="modal-overlay hidden" id="add-tab-modal">
    <div class="modal">
      <button class="modal-close" id="add-tab-close" aria-label="Close">✕</button>
      <h2>New Tab</h2>
      <div class="form-group">
        <label>Tab Name</label>
        <input type="text" id="new-tab-name" placeholder="e.g. VPN" maxlength="30" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="add-tab-cancel">Cancel</button>
        <button class="btn-save" id="add-tab-save">Create Tab</button>
      </div>
    </div>
  </div>

  <!-- Edit Tab Name Modal -->
  <div class="modal-overlay hidden" id="edit-tab-modal">
    <div class="modal">
      <button class="modal-close" id="edit-tab-close" aria-label="Close">✕</button>
      <h2>Rename Tab</h2>
      <div class="form-group">
        <label>Tab Name</label>
        <input type="text" id="edit-tab-name" placeholder="Tab name" maxlength="30" />
      </div>
      <input type="hidden" id="edit-tab-id" />
      <div class="modal-actions">
        <button class="btn-cancel" id="edit-tab-cancel">Cancel</button>
        <button class="btn-save" id="edit-tab-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Admin Portal Modal -->
  <div class="modal-overlay hidden" id="admin-modal">
    <div class="modal modal-wide">
      <button class="modal-close" id="admin-modal-close" aria-label="Close">✕</button>
      <h2>Admin Portal</h2>
      <p class="admin-desc">Manage which Google accounts have admin access.</p>
      <div class="form-group">
        <label>Add Admin Email</label>
        <div class="inline-input-row">
          <input type="email" id="new-admin-email" placeholder="user@gmail.com" />
          <button class="btn-save" id="add-admin-btn">Add</button>
        </div>
      </div>
      <div id="admin-list" class="admin-list">
        <!-- Rendered by JS -->
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="admin-modal-close2">Close</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>
  
 <!-- Load .env config FIRST, before Firebase modules -->
	<script src="env-loader.js"></script>
	
  <!-- Firebase SDK -->
  <script type="module" src="firebase-init.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
